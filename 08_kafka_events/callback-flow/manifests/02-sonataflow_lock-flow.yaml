apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  annotations:
    sonataflow.org/description: ""
    sonataflow.org/expressionLang: jq
    sonataflow.org/profile: gitops
    sonataflow.org/version: 1.0.0
  creationTimestamp: null
  labels:
    app: lock-flow
    app.kubernetes.io/component: serverless-workflow
    app.kubernetes.io/instance: lock-flow
    app.kubernetes.io/managed-by: sonataflow-operator
    app.kubernetes.io/name: lock-flow
    app.kubernetes.io/version: main
    sonataflow.org/workflow-app: lock-flow
    sonataflow.org/workflow-namespace: ""
  name: lock-flow
spec:
  flow:
    events:
    - correlation:
      - contextAttributeName: lockid
      dataOnly: true
      kind: consumed
      name: lock-event
      source: local
      type: lock-event
    - correlation:
      - contextAttributeName: lockid
      dataOnly: true
      kind: consumed
      name: release-event
      source: local
      type: release-event
    - correlation:
      - contextAttributeName: lockid
      dataOnly: true
      kind: produced
      name: notify-event
      type: notify-event
    - correlation:
      - contextAttributeName: lockid
      dataOnly: true
      kind: produced
      name: released-event
      type: released-event
    functions:
    - name: sysLog
      operation: sysout:INFO
      type: custom
    start:
      stateName: listenToLock
    states:
    - exclusive: true
      name: listenToLock
      onEvents:
      - actionMode: sequential
        actions:
        - actionDataFilter:
            useResults: true
          functionRef:
            arguments:
              message: ${ "Lock received " + .name }
            invoke: sync
            refName: sysLog
        eventDataFilter:
          useData: true
        eventRefs:
        - lock-event
      transition:
        nextState: notifyLock
      type: event
    - actionMode: sequential
      actions:
      - actionDataFilter:
          useResults: true
        eventRef:
          data: ${ "Workflow " + $WORKFLOW.id + " has now the lock " + .name }
          invoke: sync
          resultEventRef: ""
          triggerEventRef: notify-event
      - actionDataFilter:
          useResults: true
        functionRef:
          arguments:
            message: ${ "Notified lock release " + .name }
          invoke: sync
          refName: sysLog
      name: notifyLock
      transition:
        nextState: waitForRelease
      type: operation
    - action:
        actionDataFilter:
          useResults: true
        functionRef:
          arguments:
            message: ${ "Waiting lock release " + .name }
          invoke: sync
          refName: sysLog
      eventRef: release-event
      name: waitForRelease
      timeouts:
        eventTimeout: PT3M
      transition:
        nextState: releaseLock
      type: callback
    - actionMode: sequential
      actions:
      - actionDataFilter:
          useResults: true
        functionRef:
          arguments:
            message: ${ "Lock " +  .name +  " released" }
          invoke: sync
          refName: sysLog
      end:
        produceEvents:
        - data: '{test: "testYOOOOOOOOOOOOOOOO"}'
          eventRef: released-event
      name: releaseLock
      type: operation
  podTemplate:
    container:
      image: quay.io/orchestrator/demo-callback-flow:latest
      resources: {}
  resources: {}
status:
  address: {}
  lastTimeRecoverAttempt: null
