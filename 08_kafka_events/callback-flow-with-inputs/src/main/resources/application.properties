# This server can be fired up as a docker/podman container, see the README.md
%prod.kafka.bootstrap.servers=my-cluster-kafka-bootstrap:9092
%dev.kafka.bootstrap.servers=localhost:9092
# Note the `topic` property; If your broker has different topic names you can change this property.
mp.messaging.incoming.lock-event-with-inputs.connector=smallrye-kafka
mp.messaging.incoming.lock-event-with-inputs.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.incoming.lock-event-with-inputs.topic=lock-event-with-inputs
mp.messaging.incoming.release-event-with-inputs.connector=smallrye-kafka
mp.messaging.incoming.release-event-with-inputs.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.incoming.release-event-with-inputs.topic=release-event-with-inputs
mp.messaging.outgoing.released-event-with-inputs.connector=smallrye-kafka
mp.messaging.outgoing.released-event-with-inputs.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.released-event-with-inputs.topic=released-event-with-inputs
mp.messaging.outgoing.notify-event-with-inputs.connector=smallrye-kafka
mp.messaging.outgoing.notify-event-with-inputs.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.notify-event-with-inputs.topic=notify-event-with-inputs
quarkus.kafka.devservices.enabled=false
%test.quarkus.kafka.devservices.enabled=true
%test.quarkus.kafka.devservices.provider=kafka-native
%test.quarkus.kafka.devservices.topic-partitions.release-event-with-inputs=1
%test.quarkus.kafka.devservices.topic-partitions.lock-event-with-inputs=1
%test.quarkus.kafka.devservices.topic-partitions.released-event-with-inputs=1
%test.quarkus.kafka.devservices.topic-partitions.notify-event-with-inputs=1
# TLS support uncomment if you need TLS support
#%dev.kafka.bootstrap.servers=localhost:9093
#%dev.mp.messaging.connector.smallrye-kafka.security.protocol=SSL
# Specify the enabled TLS protocols (forcing TLSv1.2)
#%dev.mp.messaging.connector.smallrye-kafka.ssl.enabled.protocols=TLSv1.2
# Truststore configuration (so the client can validate the broker?s certificate)
# Make sure that you export KAFKA_TRUSTSTORE_PATH locally
# e.g. from the project's root path `export KAFKA_TRUSTSTORE_PATH=$(pwd)`
#%dev.mp.messaging.connector.smallrye-kafka.ssl.truststore.location=${KAFKA_TRUSTSTORE_PATH}/kafka.server.truststore.jks
#%dev.mp.messaging.connector.smallrye-kafka.ssl.truststore.password=changeit
# If mutual TLS is required (client authentication), set the following:
#%dev.mp.messaging.connector.smallrye-kafka.ssl.keystore.location=${KAFKA_TRUSTSTORE_PATH}/kafka.server.keystore.jks
#%dev.mp.messaging.connector.smallrye-kafka.ssl.keystore.password=changeit
#%dev.mp.messaging.connector.smallrye-kafka.ssl.key.password=changeit
