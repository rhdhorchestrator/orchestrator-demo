# yaml-language-server: $schema=https://raw.githubusercontent.com/serverlessworkflow/specification/refs/heads/0.8.x/schema/workflow.json
id: lock-flow-with-inputs
specVersion: "0.8"
name: callback-flow-with-inputs
key: lock-flow-with-inputs
version: "1.0.0"
dataInputSchema: schemas/lock-data-schema.json
extensions:
  - extensionid: workflow-output-schema
    outputSchema: schemas/workflow-output-schema.json
events:
  - type: lock-event-with-inputs
    kind: consumed
    name: lock-event-with-inputs
    source: local
    correlation:
      - contextAttributeName: lockid
  - type: release-event-with-inputs
    kind: consumed
    name: release-event-with-inputs
    source: local
    correlation:
      - contextAttributeName: lockid
  - type: notify-event-with-inputs
    kind: produced
    name: notify-event-with-inputs
    correlation:
      - contextAttributeName: lockid
  - type: released-event-with-inputs
    kind: produced
    name: released-event-with-inputs
    correlation:
      - contextAttributeName: lockid
functions:
  - name: sysLog
    type: custom
    operation: sysout:INFO
start: listenToLock
states:
  - name: listenToLock
    type: event
    onEvents:
      - eventRefs:
          - lock-event-with-inputs
        actions:
          - functionRef:
              refName: sysLog
              arguments:
                message: ${ "Lock received " + .name }
    transition: notifyLock
  - name: notifyLock
    type: operation
    actions:
      - eventRef:
          data: ${ "Workflow " + $WORKFLOW.id + " has now the lock " + .name }
          triggerEventRef: notify-event-with-inputs
      - functionRef:
          refName: sysLog
          arguments:
            message: ${ "Notified lock release " + .name }
    transition: waitForRelease
  - name: waitForRelease
    type: callback
    action:
      functionRef:
        refName: sysLog
        arguments:
          message: ${ "Waiting lock release " + .name }
    eventRef: release-event-with-inputs
    timeouts:
      eventTimeout: PT3M
    transition: releaseLock
  - name: releaseLock
    type: operation
    actions:
      - functionRef:
          refName: sysLog
          arguments:
            message: ${ "Lock " +  .name +  " released" }
    end:
      produceEvents:
        - eventRef: released-event-with-inputs
          data: '{test: "testYOOOOOOOOOOOOOOOO"}'
